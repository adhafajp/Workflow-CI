name: Artifact

on:
  workflow_call:
    inputs:
      run_id:
        description: MLflow run_id hasil training
        required: true
        type: string
      deploy_version:
        description: Model version yang dipromote
        required: true
        type: string
      deploy_stage:
        description: Stage model (Production)
        required: true
        type: string
    outputs:
      drive_subfolder_id:
        description: Google Drive subfolder ID untuk run ini (dipakai docker job)
        value: ${{ jobs.artifact.outputs.drive_subfolder_id }}

jobs:
  artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      drive_subfolder_id: ${{ steps.upload_artifacts.outputs.drive_subfolder_id }}

    steps:
      # --------------------------
      # 1. Run actions/checkout@v4
      # --------------------------
      - name: Run actions/checkout@v4
        uses: actions/checkout@v4

      # ------------------------------
      # 2. Download training artifacts
      # ------------------------------
      - name: Download training artifacts
        uses: actions/download-artifact@v4
        with:
          name: training-artifacts-${{ inputs.run_id }}
          path: MLProject/

      # ------------------------------
      # 3. Install Python dependencies
      # ------------------------------
      - name: Install Python dependencies
        run: |
          pip install google-auth-oauthlib google-api-python-client -q

      # -------------------------
      # 4. Upload to Google Drive
      # -------------------------
      - name: Upload to Google Drive
        id: upload_artifacts
        env:
          GOOGLE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_OAUTH_CREDENTIALS }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          RUN_ID: ${{ inputs.run_id }}
        run: |
          python - <<'EOF'
          import os, json
          from google.oauth2.credentials import Credentials
          from google.auth.transport.requests import Request
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          from datetime import datetime

          creds_info = json.loads(os.environ["GOOGLE_OAUTH_CREDENTIALS"])
          creds = Credentials(
              token=None,
              refresh_token=creds_info["refresh_token"],
              client_id=creds_info["client_id"],
              client_secret=creds_info["client_secret"],
              token_uri=creds_info["token_uri"]
          )
          creds.refresh(Request())

          service     = build("drive", "v3", credentials=creds)
          root_folder = os.environ["GOOGLE_DRIVE_FOLDER_ID"]
          mlflow_run  = os.environ.get("RUN_ID", "unknown")[:8]
          timestamp   = datetime.now().strftime("%Y%m%d_%H%M%S")
          folder_name = f"run_{timestamp}_{mlflow_run}"

          subfolder = service.files().create(
              body={
                  "name":     folder_name,
                  "mimeType": "application/vnd.google-apps.folder",
                  "parents":  [root_folder]
              },
              fields="id"
          ).execute()
          subfolder_id = subfolder.get("id")
          print(f"Created folder: {folder_name} (id: {subfolder_id})")

          # Write subfolder_id ke GITHUB_OUTPUT biar bisa jadi workflow output
          github_output = os.environ.get("GITHUB_OUTPUT")
          if github_output:
              with open(github_output, "a") as f:
                  f.write(f"drive_subfolder_id={subfolder_id}\n")

          def upload(filepath, name):
              if not os.path.exists(filepath):
                  print(f"SKIP (not found): {filepath}")
                  return
              media = MediaFileUpload(filepath, resumable=True)
              file  = service.files().create(
                  body={"name": name, "parents": [subfolder_id]},
                  media_body=media
              ).execute()
              print(f"  Uploaded: {name} (id: {file.get('id')})")

          upload("MLProject/run_info.txt", "run_info.txt")
          upload("MLProject/confusion_matrix.png", "confusion_matrix.png")
          upload("MLProject/roc_curve.png", "roc_curve.png")
          upload("MLProject/feature_importance.png", "feature_importance.png")
          upload("MLProject/metrics.json", "metrics.json")
          upload("MLProject/classification_report.json", "classification_report.json")

          print(f"Training artifacts uploaded to: {folder_name}")
          EOF
