name: Setup Python
description: Setup Python with pip caching and env check

inputs:
  python-version:
    description: Python version to use
    required: false
    default: "3.12.7"

runs:
  using: composite
  steps:
    # -------------
    # Set up Python
    # -------------
    - name: Set up Python ${{ inputs.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: "pip"

    # ---------
    # Check Env
    # ---------
    - name: Check Env
      shell: bash
      run: |
        echo "Python version:"
        python --version
        echo "Pip version:"
        pip --version
        echo "Working directory:"
        pwd
        echo "Directory contents:"
        ls -la
